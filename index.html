<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Piscataway Panic</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      touch-action: none;
      gap: 8px;
      padding: 4px;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 2px solid #333;
      display: block;
    }
    .btn {
      width: 64px;
      background: #1a1a2e;
      border: 2px solid #444;
      color: #aaa;
      font-family: monospace;
      font-size: 24px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .btn:active { background: #2a2a4e; border-color: #88f; }
    /* Landscape: buttons stretch full height beside the canvas */
    @media (orientation: landscape) {
      .btn { align-self: stretch; }
    }
    /* Portrait: canvas on top, buttons side-by-side below */
    @media (orientation: portrait) {
      body {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr auto;
        gap: 8px;
        padding: 8px;
        align-items: center;
        justify-items: center;
      }
      canvas { grid-column: 1 / 3; grid-row: 1; }
      #btnLeft  { grid-column: 1; grid-row: 2; width: 100%; height: 70px; }
      #btnRight { grid-column: 2; grid-row: 2; width: 100%; height: 70px; }
    }
  </style>
</head>
<body>
  <div class="btn" id="btnLeft">&#9664;</div>
  <canvas id="game"></canvas>
  <div class="btn" id="btnRight">&#9654;</div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const W = 160, H = 120;
    canvas.width = W;
    canvas.height = H;

    function resizeCanvas() {
      const isLandscape = window.innerWidth > window.innerHeight;
      let scale;
      if (isLandscape) {
        // Row layout: 64px buttons on each side, 4px padding, 8px gaps
        const availW = window.innerWidth  - (64 + 8) * 2 - 4 * 2;
        const availH = window.innerHeight - 4 * 2;
        scale = Math.max(1, Math.min(Math.floor(availW / W), Math.floor(availH / H)));
      } else {
        // Grid layout: buttons below (70px tall + 8px gap), 8px padding
        const availW = window.innerWidth  - 8 * 2;
        const availH = window.innerHeight - 70 - 8 - 8 * 2;
        scale = Math.max(1, Math.min(Math.floor(availW / W), Math.floor(availH / H)));
      }
      canvas.style.width  = W * scale + 'px';
      canvas.style.height = H * scale + 'px';
    }

    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // Pixel size for sprite pixels
    const PX = 2;

    // --- Sprite pixel art (16x16 grid, each cell = PX px) ---
    // Colors: 0=transparent, 1=skin, 2=hair, 3=shirt, 4=pants, 5=shoes
    const PALETTE = ['', '#f5c99a', '#3b1f0e', '#00cc66', '#e07b00', '#2b2b2b'];

    const FRAMES = {
      idle: [
        [
          '0022220000000000',
          '0021110000000000',
          '0021210000000000',
          '0022220000000000',
          '0033330000000000',
          '3033303000000000',
          '3033303000000000',
          '0033330000000000',
          '0044440000000000',
          '0044440000000000',
          '0044040000000000',
          '0044040000000000',
          '0055005000000000',
          '0055005000000000',
          '0000000000000000',
          '0000000000000000',
        ]
      ],
      walkR: [
        // frame 1
        [
          '0022220000000000',
          '0021110000000000',
          '0021210000000000',
          '0022220000000000',
          '0033330000000000',
          '3033303000000000',
          '3033303000000000',
          '0033330000000000',
          '0044440000000000',
          '0004400000000000',
          '0404040000000000',
          '0404000000000000',
          '0055500000000000',
          '0000500000000000',
          '0000000000000000',
          '0000000000000000',
        ],
        // frame 2
        [
          '0022220000000000',
          '0021110000000000',
          '0021210000000000',
          '0022220000000000',
          '0033330000000000',
          '0303330000000000',
          '0303330000000000',
          '0033330000000000',
          '0044440000000000',
          '0440000000000000',
          '0404040000000000',
          '0004040000000000',
          '0000550000000000',
          '0000055000000000',
          '0000000000000000',
          '0000000000000000',
        ]
      ],
      walkL: [
        [
          '0000000000000000',
          '0000000000000000',
          '0000000000000000',
          '0000000000000000',
          '0000000000000000',
          '0000000000000000',
          '0000000000000000',
          '0000000000000000',
          '0000000000000000',
          '0000000000000000',
          '0000000000000000',
          '0000000000000000',
          '0000000000000000',
          '0000000000000000',
          '0000000000000000',
          '0000000000000000',
        ]
      ]
    };

    // Mirror walkR frames to make walkL
    FRAMES.walkL = FRAMES.walkR.map(frame =>
      frame.map(row => row.split('').reverse().join(''))
    );

    function drawSprite(frame, x, y) {
      for (let row = 0; row < frame.length; row++) {
        for (let col = 0; col < frame[row].length; col++) {
          const c = parseInt(frame[row][col]);
          if (c === 0) continue;
          ctx.fillStyle = PALETTE[c];
          ctx.fillRect(x + col * PX, y + row * PX, PX, PX);
        }
      }
    }

    // --- Game state ---
    const GROUND_Y = H - 28;
    const SPRITE_H = 16 * PX;
    const SPEED = 1.2;

    const player = {
      x: W / 2 - 16,
      y: GROUND_Y - SPRITE_H,
      vx: 0,
      facing: 'idle',
      animFrame: 0,
      animTimer: 0,
      animSpeed: 10, // ticks per frame
    };

    // Input state
    const keys = { left: false, right: false };

    // Keyboard
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft'  || e.key === 'a') keys.left  = true;
      if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
    });
    document.addEventListener('keyup', e => {
      if (e.key === 'ArrowLeft'  || e.key === 'a') keys.left  = false;
      if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
    });

    // Touch buttons
    function hold(el, key) {
      el.addEventListener('touchstart', e => { e.preventDefault(); keys[key] = true;  }, { passive: false });
      el.addEventListener('touchend',   e => { e.preventDefault(); keys[key] = false; }, { passive: false });
      el.addEventListener('mousedown',  () => keys[key] = true);
      el.addEventListener('mouseup',    () => keys[key] = false);
      el.addEventListener('mouseleave', () => keys[key] = false);
    }
    hold(document.getElementById('btnLeft'),  'left');
    hold(document.getElementById('btnRight'), 'right');

    // --- Draw helpers ---
    function drawBackground() {
      // Sky
      ctx.fillStyle = '#0d1b3e';
      ctx.fillRect(0, 0, W, H);

      // Moon
      ctx.fillStyle = '#ffffcc';
      ctx.fillRect(130, 8, 10, 10);
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(133, 8, 5, 5); // crescent cut

      // Stars (fixed positions)
      ctx.fillStyle = '#ffffff';
      [[10,5],[30,12],[55,4],[80,9],[100,3],[145,14],[20,18]].forEach(([sx,sy]) => {
        ctx.fillRect(sx, sy, 1, 1);
      });

      // Ground
      ctx.fillStyle = '#2d4a1e';
      ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

      // Sidewalk stripe
      ctx.fillStyle = '#888';
      ctx.fillRect(0, GROUND_Y, W, 3);

      // Other building silhouettes
      ctx.fillStyle = '#111';
      ctx.fillRect(30, 55, 20, GROUND_Y - 55);
      ctx.fillRect(110, 35, 30, GROUND_Y - 35);
      ctx.fillRect(145, 60, 15, GROUND_Y - 60);

      // Other building windows (yellow lit)
      ctx.fillStyle = '#ffdd57';
      [[115,43],[115,53],[123,43],[123,53],[148,67]].forEach(([wx,wy]) => {
        ctx.fillRect(wx, wy, 4, 3);
      });

      // --- Ice Cream Parlor (left side) ---
      // Building body
      ctx.fillStyle = '#0f0518';
      ctx.fillRect(0, 44, 30, GROUND_Y - 44);

      // Upper facade (slightly lighter)
      ctx.fillStyle = '#1e0a2e';
      ctx.fillRect(0, 44, 30, 16);

      // Neon sign — pink with bright center
      ctx.fillStyle = '#ff3c8e';
      ctx.fillRect(1, 53, 28, 5);
      ctx.fillStyle = '#ffcce5';
      ctx.fillRect(2, 54, 26, 3);

      // Awning — alternating pink/cream stripes (5px each)
      for (let i = 0; i < 30; i++) {
        ctx.fillStyle = (Math.floor(i / 5) % 2 === 0) ? '#d63384' : '#ffe4ef';
        ctx.fillRect(i, 59, 1, 5);
      }
      ctx.fillStyle = '#a61e4d';
      ctx.fillRect(0, 63, 30, 1); // awning bottom edge

      // Storefront window (warm lit)
      ctx.fillStyle = '#ffe8c8';
      ctx.fillRect(2, 65, 16, 14);
      ctx.fillStyle = '#fffbee';
      ctx.fillRect(3, 66, 14, 12);

      // Pink scoop cone in window
      ctx.fillStyle = '#c68642';
      ctx.fillRect(5, 72, 4, 6);   // wafer
      ctx.fillStyle = '#ffb3c6';
      ctx.fillRect(4, 67, 6, 5);   // pink scoop

      // Mint scoop cone in window
      ctx.fillStyle = '#c68642';
      ctx.fillRect(13, 72, 4, 6);  // wafer
      ctx.fillStyle = '#a8e6cf';
      ctx.fillRect(12, 67, 6, 5);  // mint scoop

      // Door (dark wood, pink trim, gold knob)
      ctx.fillStyle = '#2c1a07';
      ctx.fillRect(20, 72, 9, GROUND_Y - 72);
      ctx.fillStyle = '#ff3c8e';
      ctx.fillRect(20, 71, 9, 1);
      ctx.fillStyle = '#ffd700';
      ctx.fillRect(24, 80, 2, 2);

      // Rooftop ice cream cone ornament
      ctx.fillStyle = '#c68642';
      ctx.fillRect(10, 42, 5, 2);  // cone base
      ctx.fillRect(11, 40, 3, 2);  // cone mid
      ctx.fillRect(12, 38, 1, 2);  // cone tip
      ctx.fillStyle = '#ffb3c6';
      ctx.fillRect(10, 34, 5, 5);  // scoop
      ctx.fillRect(11, 33, 3, 1);  // scoop top
      ctx.fillStyle = '#e63946';
      ctx.fillRect(12, 32, 1, 1);  // cherry
    }

    // --- Game loop ---
    let tick = 0;
    function update() {
      player.vx = 0;
      if (keys.left)  player.vx = -SPEED;
      if (keys.right) player.vx =  SPEED;

      player.x += player.vx;
      player.x = Math.max(0, Math.min(W - 16 * PX, player.x));

      // Animation
      if (player.vx > 0) player.facing = 'walkR';
      else if (player.vx < 0) player.facing = 'walkL';
      else player.facing = 'idle';

      player.animTimer++;
      if (player.animTimer >= player.animSpeed) {
        player.animTimer = 0;
        const frames = FRAMES[player.facing];
        player.animFrame = (player.animFrame + 1) % frames.length;
      }
      // Reset frame index when switching animation
      tick++;
    }

    function render() {
      drawBackground();
      const frames = FRAMES[player.facing];
      drawSprite(frames[player.animFrame % frames.length], Math.round(player.x), Math.round(player.y));
    }

    function loop() {
      update();
      render();
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
